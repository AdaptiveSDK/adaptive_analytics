name: adaptive_analytics
description: >-
  Flutter plugin for the Adaptive SDK Analytics module. Logs learning events
  (badge earnings, quiz submissions, grade changes, course enrolments, etc.)
  to the Adaptive e-learning platform.
version: 1.0.22
homepage: https://github.com/AdaptiveSDK/adaptive_analytics
repository: https://github.com/AdaptiveSDK/adaptive_analytics
issue_tracker: https://github.com/AdaptiveSDK/adaptive_analytics/issues

topics:
  - adaptive
  - analytics
  - e-learning
  - lms

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.adaptive.analytics
        pluginClass: AdaptiveAnalyticsFlutterPlugin
      ios:
        pluginClass: AdaptiveAnalyticsFlutterPlugin
