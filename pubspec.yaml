name: adaptive_analytics_flutter
description: >-
  Flutter plugin for the Adaptive SDK Analytics module. Logs learning events
  (badge earnings, quiz submissions, grade changes, course enrolments, etc.)
  to the Adaptive e-learning platform.
version: 1.0.0
homepage: https://github.com/adaptivesdk/adaptive_analytics_flutter
repository: https://github.com/adaptivesdk/adaptive_analytics_flutter
issue_tracker: https://github.com/adaptivesdk/adaptive_analytics_flutter/issues

topics:
  - adaptive
  - analytics
  - e-learning
  - lms

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.adaptive.analytics_flutter
        pluginClass: AdaptiveAnalyticsFlutterPlugin
